<style>
:root{--main:#2563eb;--main-d:#1d4ed8;--ok:#059669;--ng:#dc2626;--wn:#d97706;--bg:#f4f6fb;--card:#fff;--line:#e5e7eb;--txt:#1f2937;--sub:#6b7280}
*{box-sizing:border-box}html,body{margin:0}body{font-family:"Segoe UI","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;background:var(--bg);color:var(--txt);font-size:17px;-webkit-text-size-adjust:100%}
header{background:var(--main);color:#fff;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.15);position:sticky;top:0;z-index:5;display:flex;justify-content:space-between;align-items:center}

.mp{background:#fff;color:var(--main);border:none;border-radius:10px;padding:11px 14px;font-weight:800;font-size:14px;cursor:pointer;min-height:44px}
.wrap{max-width:860px;margin:0 auto;padding:14px}
.sec{font-size:16px;font-weight:800;color:var(--main-d);margin:20px 2px 10px;border-left:5px solid var(--main);padding-left:10px}
.note{font-size:13px;color:var(--sub);background:#fff;border:1px dashed var(--line);border-radius:12px;padding:12px 14px;margin:6px 0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.tile{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 16px;cursor:pointer;transition:.1s;min-height:76px;display:flex;flex-direction:column;justify-content:center}
.tile:active{transform:scale(.98);border-color:var(--main)}
.tile b{display:block;font-size:17px;margin-bottom:4px;line-height:1.3}.tile span{font-size:13px;color:var(--sub)}
.tile.big{grid-column:1/-1;flex-direction:row;align-items:center;justify-content:space-between}
.tile.big b{font-size:19px}
.bar{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:12px;font-size:14px;color:var(--sub)}
.bar b{color:var(--main);font-size:17px}
.btn{font-size:16px;font-weight:800;border:none;border-radius:12px;padding:14px 18px;cursor:pointer;color:#fff;background:var(--main);min-height:52px;width:100%}
.btn.ghost{background:#fff;color:var(--main);border:2px solid var(--main)}.btn:active{transform:translateY(1px)}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.qno{display:inline-block;background:var(--main);color:#fff;font-size:12px;padding:3px 12px;border-radius:999px}
.tags{float:right;font-size:12px;color:var(--sub)}
.stem{font-size:18px;line-height:1.9;margin:10px 0 16px;white-space:pre-wrap}
.opt{display:block;width:100%;text-align:left;border:2px solid var(--line);background:#fff;border-radius:14px;padding:15px;margin:9px 0;font-size:17px;cursor:pointer;min-height:54px}
.opt:active{border-color:var(--main)}.opt.correct{border-color:var(--ok);background:#ecfdf5}.opt.wrong{border-color:var(--ng);background:#fef2f2}
.txin{width:100%;font-size:17px;padding:12px 14px;border:2px solid var(--line);border-radius:10px;outline:none}.txin:focus{border-color:var(--main)}.txin:disabled{background:#f3f4f6}
.qhtml{overflow-x:auto;margin:8px 0}.qhtml table{border-collapse:collapse;font-size:12px;min-width:100%}.qhtml th,.qhtml td{border:1px solid var(--line);padding:3px 6px;text-align:right;white-space:nowrap}.qhtml th{background:#eef2ff;text-align:center}.qhtml td:first-child,.qhtml th:first-child{text-align:center}
.oxrow{display:flex;gap:12px}.oxrow .opt{text-align:center;font-size:26px;font-weight:800}
.judge{margin-top:12px;font-size:17px;font-weight:800;display:none}.judge.show{display:block}.judge.ok{color:var(--ok)}.judge.ng{color:var(--ng)}
.expl{margin-top:10px;font-size:14px;color:var(--sub);background:#f9fafb;border-radius:10px;padding:11px 13px;display:none}.expl.show{display:block}
.nav{display:flex;gap:10px;margin-top:8px}
.src{margin-top:10px;font-size:11px;color:#9ca3af}
.crumbrow{display:flex;gap:10px;margin:2px 0 14px;flex-wrap:wrap}.crumb{font-size:15px;color:var(--main);font-weight:800;background:#fff;border:2px solid var(--line);border-radius:12px;cursor:pointer;padding:11px 16px;min-height:46px;flex:1;text-align:center}.crumb:active{background:#eff6ff;border-color:var(--main)}
.exbox{white-space:pre-wrap;font-size:16px;line-height:1.85;background:#fbfcfe;border:1px solid var(--line);border-radius:12px;padding:16px;margin:8px 0}
.ans{display:none}.ans.show{display:block}
.rrow{display:flex;justify-content:space-between;align-items:center;padding:12px 4px;border-bottom:1px solid var(--line);font-size:15px}
.rrow .d{color:var(--sub);font-size:12px}
.pill{display:inline-block;font-size:13px;padding:3px 11px;border-radius:999px;font-weight:800;color:#fff}
.pg{background:#e5e7eb;border-radius:7px;height:11px;overflow:hidden;flex:1}.pg>i{display:block;height:100%}
.fr{display:flex;align-items:center;gap:10px;margin:11px 0;font-size:14px}.fr .nm{width:110px;flex-shrink:0}.fr .pc{width:46px;text-align:right;font-weight:800}
@media(min-width:600px){.grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}.nav{max-width:420px}}

<script>
const SETS=[{"f": "在庫管理", "label": "在庫管理 ①", "q": [{"k": "○×", "s": "在庫回転期間が短いほど、在庫効率が良いと評価される。", "a": "○", "e": "在庫が早く回転していることは、滞留在庫が少ない証拠。", "src": "7.28〇✖問題部品士2級⓶在庫管理.xlsx"}, {"k": "○×", "s": "在庫金額は帳簿価格で記録され、市場価格の変動は無関係である。", "a": "○", "e": "会計上は帳簿価格ベースで管理される。", "src": "7.28〇✖問題部品士2級⓶在庫管理.xlsx"}, {"k": "○×", "s": "緊急性が高い部品は、在管コードの上位に位置付けられ、重点在庫として扱われる。", "a": "○", "e": "整備頻度や出庫スピードから高評価が付く。", "src": "7.28〇✖問題部品士2級⓶在庫管理.xlsx"}, {"k": "○×", "s": "グレードFの部品は、コンパス発注の対象となる。", "a": "○", "e": "コンパス対象グレードはA〜Fまでであり、Fも対象となる。", "src": "7.28〇✖問題部品士2級⓶在庫管理.xlsx"}, {"k": "○×", "s": "かんばん品の個別修正は、実績乖離が見られた場合には自由に行ってよい。", "a": "×", "e": "修正は例外で、繰上値での調整が原則。", "src": "7.28〇✖問題部品士2級⓶在庫管理.xlsx"}, {"k": "○×", "s": "部品ごとの在庫数量を過去の出庫実績で設定するのは、かんばん方式の一つである。", "a": "○", "e": "実績ベースの補充システムが基本。", "src": "7.28〇✖問題部品士2級⓶在庫管理.xlsx"}, {"k": "○×", "s": "特殊グレード「O」は在庫不要品で、原則かんばん数は0固定である。", "a": "○", "e": "「O」は都度発注対象で補充は行わない。", "src": "7.28〇✖問題部品士2級⓶在庫管理.xlsx"}, {"k": "○×", "s": "特殊グレード「P」は拠点実績を本社で管理し、拠点では在庫を持たない。", "a": "○", "e": "「P」は本社集中管理用グレード。", "src": "7.28〇✖問題部品士2級⓶在庫管理.xlsx"}, {"k": "○×", "s": "グレード「B」は出庫実績が低いため、かんばん補充対象外となる。", "a": "×", "e": "Bは在庫対象で、補充対象に含まれる。", "src": "7.28〇✖問題部品士2級⓶在庫管理.xlsx"}, {"k": "○×", "s": "仮仕入の部品は、納品未確認でも在庫に自動計上される。", "a": "×", "e": "仮仕入は未確認であり、在庫には計上不可。", "src": "7.28〇✖問題部品士2級⓶在庫管理.xlsx"}, {"k": "○×", "s": "グレード「Z」は24か月出庫実績がない部品に自動的に設定される。", "a": "○", "e": "「Z」は未稼働部品の扱い。", "src": "7.28〇✖問題部品士2級⓶在庫管理.xlsx"}, {"k": "○×", "s": "特殊グレード「T」は、かんばん数修正画面で任意に設定する。", "a": "○", "e": "固定数量管理のため手動入力。", "src": "7.28〇✖問題部品士2級⓶在庫管理.xlsx"}, {"k": "○×", "s": "棚卸誤差が発生しても、在庫数が一致していれば再棚卸は不要である。", "a": "×", "e": "原因分析と監査が必要。", "src": "7.28〇✖問題部品士2級⓶在庫管理.xlsx"}, {"k": "○×", "s": "月次で在庫評価を行う際、売上原価と在庫金額の連動が必要である。", "a": "○", "e": "利益計算と在庫評価は連動する。", "src": "7.28〇✖問題部品士2級⓶在庫管理.xlsx"}, {"k": "○×", "s": "過剰在庫は、そのまま保持することで将来の需要変動に対応できるため問題とはならない。", "a": "×", "e": "保管コストや陳腐化リスクが高まる。", "src": "7.28〇✖問題部品士2級⓶在庫管理.xlsx"}, {"k": "○×", "s": "棚卸金額表にマイナス帳簿が出ている場合、原因追及をせずに修正処理する のが優先である。", "a": "×", "e": <script>
(function(){
  var db2 = firebase.firestore();
  var _fbUser = null;
  auth.onAuthStateChanged(function(u){ _fbUser = u; });
  window.addEventListener('load', function(){
    // markMiss をラップ：間違いを partsWrongAnswers/partsWrongHistory に保存
    var _origMiss = window.markMiss;
    window.markMiss = function(q, ok){
      _origMiss(q, ok);
      if(!_fbUser) return;
      var uid = _fbUser.uid;
      var src = (window.S && S.label) ? S.label : 'parts';
      var qNo = window.S ? (S.idx + 1) : 0;
      var stem = (q.s || '').substring(0, 200);
      var key = (src + '_q' + qNo).replace(/[^\w\u3040-\u9FFF]/g, '_').substring(0, 80);
      var ts = firebase.firestore.FieldValue.serverTimestamp();
      if(!ok){
        db2.collection('users').doc(uid).collection('partsWrongAnswers').doc(key).set({
          stem:stem, source:src, qNo:qNo, label:'Q'+qNo, timestamp:ts,
          url: location.origin + location.pathname
        },{merge:true}).catch(function(){});
        db2.collection('users').doc(uid).collection('partsWrongHistory').doc(key).set({
          stem:stem, source:src, qNo:qNo, label:'Q'+qNo, firstWrong:ts,
          url: location.origin + location.pathname
        },{merge:true}).catch(function(){});
      } else {
        db2.collection('users').doc(uid).collection('partsWrongAnswers').doc(key).delete().catch(function(){});
      }
    };
    // finish をラップ：試験終了時に partsStats を保存
    var _origFinish = window.finish;
    window.finish = function(){
      _origFinish();
      if(!_fbUser || !window.S || !S.list || !S.list.length) return;
      var uid = _fbUser.uid;
      var src = S.label || 'parts';
      db2.collection('users').doc(uid).collection('partsStats').doc(
        src.replace(/[^\w\u3040-\u9FFF]/g,'_').substring(0,80)
      ).set({
        source:src, lastCorrect:S.score, lastTotal:S.list.length,
        lastDate:firebase.firestore.FieldValue.serverTimestamp(),
        totalAttempts:firebase.firestore.FieldValue.increment(1)
      },{merge:true}).catch(function(){});
    };
  });
})();
</script></body></html>
